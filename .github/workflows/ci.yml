name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  backend:
    name: Backend — lint, typecheck, test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Apps/backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: Apps/backend/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run test

  backend-integration:
    name: Backend — integration (real Postgres)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Apps/backend
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: ci
          POSTGRES_PASSWORD: ci
          POSTGRES_DB: attendx_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U ci"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://ci:ci@localhost:5432/attendx_test
      BETTER_AUTH_SECRET: ci-secret-placeholder-32-characters-ok
      INTERNAL_JWT_SECRET: ci-internal-secret-placeholder-32char
      NODE_ENV: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: Apps/backend/package-lock.json
      - run: npm ci
      - run: npx prisma generate
      # Apply the committed baseline migration to the fresh DB.
      - run: npx prisma migrate deploy
      - run: npm run test:integration

  frontend:
    name: Frontend — lint, typecheck, build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Apps/website
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: Apps/website/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npx tsc --noEmit
      - run: npm run build
        env:
          BETTER_AUTH_SECRET: ci-secret-placeholder-32-characters-ok
          BETTER_AUTH_URL: http://localhost:3000
          DATABASE_URL: postgresql://ci:ci@localhost:5432/ci
          INTERNAL_JWT_SECRET: ci-internal-secret-placeholder-32char
          NEXT_PUBLIC_APP_URL: http://localhost:3000

  e2e:
    name: Web — E2E (Playwright + seeded Postgres)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: ci
          POSTGRES_PASSWORD: ci
          POSTGRES_DB: attendx_e2e
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U ci"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://ci:ci@localhost:5432/attendx_e2e
      BETTER_AUTH_SECRET: ci-secret-placeholder-32-characters-ok
      INTERNAL_JWT_SECRET: ci-internal-secret-placeholder-32char
      BETTER_AUTH_URL: http://localhost:3000
      BACKEND_URL: http://localhost:4000
      CORS_ORIGIN: http://localhost:3000
      NEXT_PUBLIC_APP_URL: http://localhost:3000
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      # ── Backend: schema + seed (shared better-auth tables) + run on :4000 ──
      - name: Install backend deps
        working-directory: Apps/backend
        run: npm ci
      - name: Apply schema + seed
        working-directory: Apps/backend
        run: |
          npx prisma generate
          npx prisma migrate deploy
          npm run db:seed
      - name: Start backend (background)
        working-directory: Apps/backend
        run: |
          npm run build
          NODE_ENV=production nohup node dist/index.js > backend.log 2>&1 &
          for i in $(seq 1 30); do
            if curl -sf http://localhost:4000/api/v1/health > /dev/null; then
              echo "backend up"; break
            fi
            echo "waiting for backend ($i)"; sleep 2
          done

      # ── Website: build + Playwright (webServer starts `next start` on :3000) ──
      - name: Install website deps
        working-directory: Apps/website
        run: npm ci
      - name: Build website
        working-directory: Apps/website
        run: npm run build
      - name: Install Playwright browsers
        working-directory: Apps/website
        run: npx playwright install --with-deps chromium
      - name: Run E2E
        working-directory: Apps/website
        env:
          CI: "true"
        run: npm run test:e2e
      - name: Upload backend log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: backend-log
          path: Apps/backend/backend.log
          if-no-files-found: ignore

  mobile:
    name: Mobile — flutter analyze
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Apps/app_flutter
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: flutter pub get
      - run: flutter analyze
