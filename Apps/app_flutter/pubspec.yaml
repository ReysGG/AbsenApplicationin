name: app_flutter
description: "AttendX — Aplikasi Absensi Digital Karyawan (mobile)."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State management
  flutter_riverpod: ^2.5.1

  # Routing
  go_router: ^14.2.7

  # Networking
  dio: ^5.7.0

  # Storage
  # Secure storage for the bearer token (Keystore on Android, Keychain on iOS).
  flutter_secure_storage: ^8.1.0

  # Utilities
  intl: ^0.20.2
  equatable: ^2.0.5

  # Location + geofence + GPS spoofing detection
  geolocator: ^13.0.1
  permission_handler: ^11.3.1

  # Camera + ML Kit face detection (liveness)
  camera: ^0.11.0+2
  google_mlkit_face_detection: ^0.13.0

  # Offline storage + auto-sync
  sqflite: ^2.3.3+1
  connectivity_plus: ^6.0.5
  path: ^1.9.0

  # Push notifications (FCM). All FCM code is guarded so the app runs even
  # without Firebase credentials (google-services.json) present.
  firebase_core: ^3.6.0
  firebase_messaging: ^15.1.3
  flutter_local_notifications: ^17.2.3
  # UI / motion — glassmorphism, declarative animations, vector animation assets
  flutter_animate: ^4.5.2
  lottie: ^3.3.3
  rive: 0.12.4
  flutter_map: 6.2.1
  latlong2: ^0.9.1
  screen_brightness: ^2.1.9

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/anim/

  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-Regular.ttf
          weight: 400
        - asset: assets/fonts/Inter-Medium.ttf
          weight: 500
        - asset: assets/fonts/Inter-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Inter-Bold.ttf
          weight: 700
