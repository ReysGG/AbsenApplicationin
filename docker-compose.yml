# AttendX local stack: Postgres + Express backend + Next.js website.
#
# Usage:
#   cp .env.docker.example .env       # then edit secrets
#   docker compose up --build
#
# Host ports (mulai dari 10000 agar tidak bentrok dengan service lain):
#   website  → http://localhost:10000
#   backend  → http://localhost:10001
#   postgres → localhost:10002
# Port di DALAM jaringan Docker tetap 3000/4000/5432 (antar-container).
#
# The Flutter mobile app is NOT containerized (it ships as an APK/IPA). Point it
# at the backend with:
#   flutter run --dart-define=USE_MOCK_DATA=false \
#               --dart-define=API_BASE_URL=http://10.0.2.2:10001/api/v1
# (10.0.2.2 is the host loopback from the Android emulator.)

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-attendx}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:-attendx}
    ports:
      - "127.0.0.1:10002:5432"
    volumes:
      - attendx_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-attendx} -d ${POSTGRES_DB:-attendx}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./Apps/backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      face-service:
        condition: service_started
    environment:
      NODE_ENV: production
      PORT: 4000
      # Backend owns the schema (prisma db push) for the shared DB.
      DATABASE_URL: postgresql://${POSTGRES_USER:-attendx}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}@db:5432/${POSTGRES_DB:-attendx}?schema=public
      DIRECT_URL: postgresql://${POSTGRES_USER:-attendx}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}@db:5432/${POSTGRES_DB:-attendx}?schema=public
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET}
      BETTER_AUTH_URL: ${BETTER_AUTH_URL:-http://localhost:10000}
      INTERNAL_JWT_SECRET: ${INTERNAL_JWT_SECRET}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:10000}
      # Base URL for activation/reset links generated by the backend. Must point
      # at the website (host port 10000), not the backend's own port.
      APP_URL: ${NEXT_PUBLIC_APP_URL:-http://localhost:10000}
      RUN_SEED: ${RUN_SEED:-true}
      # Firebase Cloud Messaging (optional). Push auto-disabled if unset.
      # Paste the service-account JSON (single line) into FIREBASE_SERVICE_ACCOUNT_JSON
      # in your host .env, OR mount a file and set FIREBASE_SERVICE_ACCOUNT_PATH.
      FIREBASE_SERVICE_ACCOUNT_JSON: ${FIREBASE_SERVICE_ACCOUNT_JSON:-}
      FIREBASE_SERVICE_ACCOUNT_PATH: ${FIREBASE_SERVICE_ACCOUNT_PATH:-}
      # Vercel Blob private storage for attendance face captures.
      BLOB_READ_WRITE_TOKEN: ${BLOB_READ_WRITE_TOKEN:-}
      BLOB_FACE_PREFIX: ${BLOB_FACE_PREFIX:-face-captures}
      # Backend-side face recognition service. This is fail-closed: enroll and
      # attendance face checks should not silently pass when the service/model is
      # unavailable.
      FACE_SERVICE_URL: ${FACE_SERVICE_URL:-http://face-service:4100}
      FACE_SERVICE_TIMEOUT_MS: ${FACE_SERVICE_TIMEOUT_MS:-8000}
      FACE_MATCH_THRESHOLD: ${FACE_MATCH_THRESHOLD:-0.6}
      FACE_QUALITY_MIN_SCORE: ${FACE_QUALITY_MIN_SCORE:-0.65}
    ports:
      - "10001:4000"
    healthcheck:
      # Node one-liner — works without curl/wget being present in alpine.
      test: ["CMD", "node", "-e", "require('http').get('http://127.0.0.1:4000/api/v1/health',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  face-service:
    build:
      context: ./Apps/face-service
    restart: unless-stopped
    environment:
      FACE_MODEL_NAME: ${FACE_MODEL_NAME:-buffalo_l}
      FACE_MODEL_ROOT: ${FACE_MODEL_ROOT:-/models}
      FACE_DET_SIZE: ${FACE_DET_SIZE:-640x640}
    volumes:
      - ${FACE_MODEL_HOST_DIR:-./models/face}:/models:ro
    ports:
      - "10003:4100"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:4100/health', timeout=3).read()"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  website:
    build:
      context: ./Apps/website
      args:
        NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-http://localhost:10000}
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3000
      # Next.js standalone server defaults to localhost; bind 0.0.0.0 so the
      # container's healthcheck (127.0.0.1) and the host port mapping both work.
      HOSTNAME: 0.0.0.0
      DATABASE_URL: postgresql://${POSTGRES_USER:-attendx}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}@db:5432/${POSTGRES_DB:-attendx}?schema=public
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET}
      BETTER_AUTH_URL: ${BETTER_AUTH_URL:-http://localhost:10000}
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-http://localhost:10000}
      INTERNAL_JWT_SECRET: ${INTERNAL_JWT_SECRET}
      # The website BFF proxies API calls to the backend container.
      BACKEND_URL: http://backend:4000
    ports:
      - "10000:3000"
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://127.0.0.1:3000/',r=>process.exit(r.statusCode<500?0:1)).on('error',()=>process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

volumes:
  attendx_pgdata:
